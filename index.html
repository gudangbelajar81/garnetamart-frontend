<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10B981" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>GarnetaMart</title>
    <script>
      // Ubah ikon, manifest, dan judul secara dinamis berdasarkan URL
      (function() {
        var path = window.location.pathname;
        var iconLink = document.querySelector('link[rel="icon"]');
        var manifestLink = document.querySelector('link[rel="manifest"]');
        var themeColor = document.querySelector('meta[name="theme-color"]');

        if (path.startsWith('/dashboard') || path.startsWith('/login')) {
          document.title = "Admin Toko";
          iconLink.href = "/icon-admin.svg";
          manifestLink.href = "/manifest-admin.json";
          themeColor.content = "#8B5CF6";
        } else if (path.startsWith('/kurir')) {
          document.title = "Portal Kurir";
          iconLink.href = "/icon-kurir.svg";
          manifestLink.href = "/manifest-kurir.json";
          themeColor.content = "#3B82F6";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Auto-reload jika ada error gagal memuat file javascript terbaru (biasanya karena update Vercel)
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.includes('Failed to fetch dynamically imported module') || e.message.includes('Importing a module script failed'))) {
          console.warn('Terdeteksi versi baru, memuat ulang halaman...');
          window.location.reload(true);
        }
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
